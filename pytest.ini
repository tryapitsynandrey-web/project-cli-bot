[pytest]
minversion = 8.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -q
    --strict-markers
    --tb=short

markers =
    integration: marks tests that use real third-party integrations or slower external-style checks

filterwarnings =
    ignore::DeprecationWarning